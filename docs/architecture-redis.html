<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Redis 数据流向图 - StudyFlow</title>
<style>
  body { margin: 0; padding: 40px; background: #f5f7fa; font-family: -apple-system, "Microsoft YaHei", sans-serif; }
  svg { display: block; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { text-align: center; color: #1a1a2e; margin-bottom: 8px; font-size: 24px; }
  p { text-align: center; color: #888; margin-bottom: 24px; font-size: 14px; }
</style>
</head>
<body>
<h1>Redis 数据流向图</h1>
<p>3 个 Key 的写入、读取、删除流向</p>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" width="1000" height="820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6abf"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4d4f"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52c41a"/>
    </marker>
  </defs>

  <!-- ===== Key1: seat:occupy ===== -->
  <rect x="20" y="20" width="960" height="250" rx="12" fill="#fff1f0" stroke="#ff4d4f" stroke-width="1.5"/>
  <text x="40" y="50" font-size="15" font-weight="700" fill="#ff4d4f">Key1: seat:occupy:{seatId}:{date}:{periodId}</text>
  <text x="40" y="70" font-size="11" fill="#999">Value: userId — 标记座位被谁占用</text>

  <!-- Redis 大框 -->
  <rect x="350" y="90" width="260" height="60" rx="10" fill="#ff4d4f" stroke="none"/>
  <text x="480" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Redis</text>
  <text x="480" y="136" text-anchor="middle" font-size="10" fill="#ffcfcf">seat:occupy:5:20250623:1 = "1001"</text>

  <!-- 写入 -->
  <rect x="40" y="100" width="180" height="50" rx="8" fill="#f0f5ff" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="130" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#5b6abf">写入</text>
  <text x="130" y="138" text-anchor="middle" font-size="9" fill="#888">ReservationServiceImpl</text>

  <line x1="220" y1="125" x2="350" y2="120" stroke="#52c41a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="280" y="110" text-anchor="middle" font-size="9" fill="#52c41a">trySet() SETNX</text>

  <!-- 读取 -->
  <rect x="40" y="180" width="180" height="50" rx="8" fill="#f6ffed" stroke="#52c41a" stroke-width="1.5"/>
  <text x="130" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#52c41a">读取</text>
  <text x="130" y="218" text-anchor="middle" font-size="9" fill="#888">SeatServiceImpl.listSeats()</text>

  <line x1="220" y1="205" x2="350" y2="185" stroke="#5b6abf" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="195" text-anchor="middle" font-size="9" fill="#5b6abf">get() → occupied?</text>

  <!-- 删除 -->
  <rect x="760" y="100" width="200" height="50" rx="8" fill="#fff1f0" stroke="#ff4d4f" stroke-width="1.5"/>
  <text x="860" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#ff4d4f">删除</text>
  <text x="860" y="138" text-anchor="middle" font-size="9" fill="#888">CancelConsumer / TimeoutConsumer</text>

  <line x1="610" y1="120" x2="760" y2="120" stroke="#ff4d4f" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="680" y="110" text-anchor="middle" font-size="9" fill="#ff4d4f">delete()</text>

  <!-- 删除详情 -->
  <rect x="760" y="170" width="200" height="50" rx="8" fill="#fff7e6" stroke="#fa8c16" stroke-width="1"/>
  <text x="860" y="192" text-anchor="middle" font-size="9" fill="#666">取消预约 → 删占座标记</text>
  <text x="860" y="206" text-anchor="middle" font-size="9" fill="#666">超时爽约 → 删占座标记 + 扣信用分</text>


  <!-- ===== Key2: user:reserve ===== -->
  <rect x="20" y="290" width="960" height="200" rx="12" fill="#f6ffed" stroke="#52c41a" stroke-width="1.5"/>
  <text x="40" y="320" font-size="15" font-weight="700" fill="#52c41a">Key2: user:reserve:{userId}:{date}:{periodId}</text>
  <text x="40" y="340" font-size="11" fill="#999">Value: userId — 防止用户同时段重复预约</text>

  <!-- Redis 大框 -->
  <rect x="350" y="355" width="260" height="60" rx="10" fill="#52c41a" stroke="none"/>
  <text x="480" y="383" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Redis</text>
  <text x="480" y="401" text-anchor="middle" font-size="10" fill="#d9f7be">user:reserve:3:20250623:1 = "3"</text>

  <!-- 写入 -->
  <rect x="40" y="365" width="180" height="50" rx="8" fill="#f0f5ff" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="130" y="387" text-anchor="middle" font-size="11" font-weight="600" fill="#5b6abf">写入</text>
  <text x="130" y="403" text-anchor="middle" font-size="9" fill="#888">ReservationServiceImpl</text>

  <line x1="220" y1="390" x2="350" y2="385" stroke="#52c41a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="280" y="375" text-anchor="middle" font-size="9" fill="#52c41a">set() 防重复预约</text>

  <!-- 删除 -->
  <rect x="760" y="365" width="200" height="50" rx="8" fill="#fff1f0" stroke="#ff4d4f" stroke-width="1.5"/>
  <text x="860" y="387" text-anchor="middle" font-size="11" font-weight="600" fill="#ff4d4f">删除</text>
  <text x="860" y="403" text-anchor="middle" font-size="9" fill="#888">CancelConsumer / TimeoutConsumer</text>

  <line x1="610" y1="385" x2="760" y2="385" stroke="#ff4d4f" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="680" y="375" text-anchor="middle" font-size="9" fill="#ff4d4f">delete()</text>


  <!-- ===== Key3: seat:stock ===== -->
  <rect x="20" y="510" width="960" height="180" rx="12" fill="#e6f7ff" stroke="#1890ff" stroke-width="1.5"/>
  <text x="40" y="540" font-size="15" font-weight="700" fill="#1890ff">Key3: seat:stock:{roomId}:{date}:{periodId}</text>
  <text x="40" y="560" font-size="11" fill="#999">Value: 剩余座位数 — 该时段库存</text>

  <!-- Redis 大框 -->
  <rect x="350" y="575" width="260" height="60" rx="10" fill="#1890ff" stroke="none"/>
  <text x="480" y="603" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Redis</text>
  <text x="480" y="621" text-anchor="middle" font-size="10" fill="#bae7ff">seat:stock:1:20250623:1 = "9"</text>

  <!-- 写入/更新 -->
  <rect x="40" y="580" width="180" height="50" rx="8" fill="#f0f5ff" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="130" y="602" text-anchor="middle" font-size="11" font-weight="600" fill="#5b6abf">写入/更新</text>
  <text x="130" y="618" text-anchor="middle" font-size="9" fill="#888">ReservationServiceImpl</text>

  <line x1="220" y1="605" x2="350" y2="600" stroke="#52c41a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="280" y="590" text-anchor="middle" font-size="9" fill="#52c41a">get() → 扣减</text>

  <text x="280" y="620" text-anchor="middle" font-size="9" fill="#52c41a">set() → 更新库存</text>

  <!-- 说明 -->
  <rect x="760" y="570" width="200" height="70" rx="8" fill="#e6f7ff" stroke="#1890ff" stroke-width="1"/>
  <text x="860" y="592" text-anchor="middle" font-size="9" fill="#666">默认库存: 10 个座位</text>
  <text x="860" y="606" text-anchor="middle" font-size="9" fill="#666">每次预约 stock - 1</text>
  <text x="860" y="620" text-anchor="middle" font-size="9" fill="#666">库存为0时拒绝预约</text>
  <text x="860" y="634" text-anchor="middle" font-size="9" fill="#999">无过期，持久化存储</text>


  <!-- TTL 说明 -->
  <rect x="20" y="710" width="960" height="60" rx="10" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/>
  <text x="40" y="738" font-size="13" font-weight="600" fill="#333">TTL 过期策略：</text>
  <rect x="180" y="724" width="16" height="16" rx="4" fill="#ff4d4f" stroke="none"/>
  <text x="204" y="738" font-size="11" fill="#666">seat:occupy → 900秒（15分钟）自动过期</text>
  <rect x="430" y="724" width="16" height="16" rx="4" fill="#52c41a" stroke="none"/>
  <text x="454" y="738" font-size="11" fill="#666">user:reserve → 900秒（15分钟）自动过期</text>
  <rect x="700" y="724" width="16" height="16" rx="4" fill="#1890ff" stroke="none"/>
  <text x="724" y="738" font-size="11" fill="#666">seat:stock → 无过期，持久化</text>
  <text x="180" y="760" font-size="10" fill="#999">TTL 兜底：即使没有取消/超时消费，Redis key 也会 15 分钟后自动清除，防止内存泄漏</text>
</svg>
</body>
</html>
