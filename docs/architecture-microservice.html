<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>微服务调用链路图 - StudyFlow</title>
<style>
  body { margin: 0; padding: 40px; background: #f5f7fa; font-family: -apple-system, "Microsoft YaHei", sans-serif; }
  svg { display: block; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { text-align: center; color: #1a1a2e; margin-bottom: 8px; font-size: 24px; }
  p { text-align: center; color: #888; margin-bottom: 24px; font-size: 14px; }
</style>
</head>
<body>
<h1>StudyFlow 微服务调用链路图</h1>
<p>Spring Cloud Alibaba 微服务架构 — Gateway + Nacos + Feign</p>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6abf"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52c41a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fa8c16"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#722ed1"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="500" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">微服务调用链路图</text>

  <!-- Nacos 注册中心 -->
  <rect x="30" y="220" width="140" height="70" rx="10" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="100" y="250" text-anchor="middle" font-size="14" font-weight="600" fill="#1890ff">Nacos</text>
  <text x="100" y="270" text-anchor="middle" font-size="11" fill="#666">注册中心 :8848</text>

  <!-- 浏览器 -->
  <rect x="380" y="60" width="240" height="60" rx="10" fill="#f0f5ff" stroke="#5b6abf" stroke-width="2"/>
  <text x="500" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#5b6abf">浏览器 (Vue)</text>
  <text x="500" y="104" text-anchor="middle" font-size="11" fill="#888">http://localhost:88</text>

  <!-- Gateway -->
  <rect x="380" y="170" width="240" height="60" rx="10" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
  <text x="500" y="196" text-anchor="middle" font-size="14" font-weight="600" fill="#fa8c16">Gateway</text>
  <text x="500" y="214" text-anchor="middle" font-size="11" fill="#888">Spring Cloud Gateway :88</text>

  <!-- User 服务 -->
  <rect x="150" y="340" width="220" height="70" rx="10" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="260" y="370" text-anchor="middle" font-size="14" font-weight="600" fill="#52c41a">User 服务</text>
  <text x="260" y="390" text-anchor="middle" font-size="11" fill="#888">用户/登录/信用分 :8081</text>

  <!-- Reservation 服务 -->
  <rect x="550" y="340" width="260" height="70" rx="10" fill="#fff1f0" stroke="#ff4d4f" stroke-width="2"/>
  <text x="680" y="370" text-anchor="middle" font-size="14" font-weight="600" fill="#ff4d4f">Reservation 服务</text>
  <text x="680" y="390" text-anchor="middle" font-size="11" fill="#888">预约/座位/签到/WebSocket :8082</text>

  <!-- MySQL - User -->
  <rect x="150" y="480" width="120" height="50" rx="8" fill="#e6fffb" stroke="#13c2c2" stroke-width="1.5"/>
  <text x="210" y="510" text-anchor="middle" font-size="12" fill="#13c2c2">MySQL</text>

  <!-- MySQL - Reservation -->
  <rect x="500" y="480" width="120" height="50" rx="8" fill="#e6fffb" stroke="#13c2c2" stroke-width="1.5"/>
  <text x="560" y="510" text-anchor="middle" font-size="12" fill="#13c2c2">MySQL</text>

  <!-- Redis -->
  <rect x="650" y="480" width="120" height="50" rx="8" fill="#fff1f0" stroke="#ff4d4f" stroke-width="1.5"/>
  <text x="710" y="510" text-anchor="middle" font-size="12" fill="#ff4d4f">Redis</text>

  <!-- RabbitMQ -->
  <rect x="800" y="480" width="120" height="50" rx="8" fill="#f9f0ff" stroke="#722ed1" stroke-width="1.5"/>
  <text x="860" y="510" text-anchor="middle" font-size="12" fill="#722ed1">RabbitMQ</text>

  <!-- 路由规则标注 -->
  <rect x="400" y="280" width="200" height="40" rx="6" fill="#f5f5f5" stroke="#d9d9d9" stroke-width="1"/>
  <text x="500" y="305" text-anchor="middle" font-size="11" fill="#666">路由规则 (application.yml)</text>

  <!-- 连线: 浏览器 → Gateway -->
  <line x1="500" y1="120" x2="500" y2="170" stroke="#5b6abf" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="150" font-size="10" fill="#5b6abf">HTTP</text>

  <!-- 连线: Gateway → Nacos -->
  <line x1="380" y1="200" x2="170" y2="240" stroke="#1890ff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="260" y="210" font-size="9" fill="#1890ff">服务发现</text>

  <!-- 连线: Gateway → User 服务 -->
  <line x1="420" y1="230" x2="260" y2="340" stroke="#52c41a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="300" y="290" font-size="10" fill="#52c41a">lb://study-flow-user</text>
  <text x="300" y="303" font-size="9" fill="#888">/api/auth/** /api/users/**</text>

  <!-- 连线: Gateway → Reservation 服务 -->
  <line x1="580" y1="230" x2="680" y2="340" stroke="#ff4d4f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="290" font-size="10" fill="#ff4d4f">lb://study-flow-reservation</text>
  <text x="660" y="303" font-size="9" fill="#888">/api/rooms/seats/reservations/ws</text>

  <!-- 连线: User → MySQL -->
  <line x1="260" y1="410" x2="210" y2="480" stroke="#13c2c2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 连线: Reservation → MySQL -->
  <line x1="620" y1="410" x2="560" y2="480" stroke="#13c2c2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 连线: Reservation → Redis -->
  <line x1="680" y1="410" x2="710" y2="480" stroke="#ff4d4f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 连线: Reservation → RabbitMQ -->
  <line x1="740" y1="410" x2="860" y2="480" stroke="#722ed1" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- 连线: Reservation → User (Feign) -->
  <line x1="550" y1="375" x2="370" y2="375" stroke="#fa8c16" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <rect x="390" y="358" width="140" height="18" rx="4" fill="#fff7e6" stroke="none"/>
  <text x="460" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#fa8c16">Feign 远程调用</text>
  <text x="460" y="400" font-size="9" fill="#888">扣/查信用分</text>

  <!-- 图例 -->
  <rect x="30" y="560" width="940" height="45" rx="8" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/>
  <text x="50" y="588" font-size="12" font-weight="600" fill="#333">图例：</text>
  <line x1="110" y1="584" x2="140" y2="584" stroke="#52c41a" stroke-width="2"/>
  <text x="148" y="588" font-size="11" fill="#666">HTTP 请求</text>
  <line x1="230" y1="584" x2="260" y2="584" stroke="#fa8c16" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="268" y="588" font-size="11" fill="#666">Feign 调用</text>
  <line x1="350" y1="584" x2="380" y2="584" stroke="#1890ff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="388" y="588" font-size="11" fill="#666">服务发现</text>
  <line x1="470" y1="584" x2="500" y2="584" stroke="#13c2c2" stroke-width="1.5"/>
  <text x="508" y="588" font-size="11" fill="#666">数据库</text>
  <line x1="570" y1="584" x2="600" y2="584" stroke="#ff4d4f" stroke-width="1.5"/>
  <text x="608" y="588" font-size="11" fill="#666">Redis</text>
  <line x1="670" y1="584" x2="700" y2="584" stroke="#722ed1" stroke-width="1.5"/>
  <text x="708" y="588" font-size="11" fill="#666">RabbitMQ</text>
</svg>
</body>
</html>
