<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MQ 消息流转图 - StudyFlow</title>
<style>
  body { margin: 0; padding: 40px; background: #f5f7fa; font-family: -apple-system, "Microsoft YaHei", sans-serif; }
  svg { display: block; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { text-align: center; color: #1a1a2e; margin-bottom: 8px; font-size: 24px; }
  p { text-align: center; color: #888; margin-bottom: 24px; font-size: 14px; }
</style>
</head>
<body>
<h1>RabbitMQ 消息流转图</h1>
<p>3 个场景：超时爽约 / 取消预约 / 签到成功</p>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6abf"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4d4f"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52c41a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#722ed1"/>
    </marker>
  </defs>

  <!-- ===== 场景1：超时爽约 ===== -->
  <rect x="20" y="20" width="960" height="220" rx="12" fill="#fff7e6" stroke="#fa8c16" stroke-width="1.5"/>
  <text x="40" y="50" font-size="16" font-weight="700" fill="#fa8c16">场景1：超时爽约</text>
  <text x="40" y="70" font-size="11" fill="#999">用户预约后 15 分钟未签到，自动判定爽约并扣信用分</text>

  <!-- 创建预约 -->
  <rect x="50" y="95" width="120" height="50" rx="8" fill="#f0f5ff" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="110" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#5b6abf">创建预约</text>
  <text x="110" y="134" text-anchor="middle" font-size="10" fill="#888">convertAndSend()</text>

  <!-- 箭头 -->
  <line x1="170" y1="120" x2="220" y2="120" stroke="#5b6abf" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 交换机 -->
  <rect x="225" y="95" width="130" height="50" rx="8" fill="#f9f0ff" stroke="#722ed1" stroke-width="1.5"/>
  <text x="290" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#722ed1">reserve.direct</text>
  <text x="290" y="132" text-anchor="middle" font-size="9" fill="#888">路由键: reserve.timeout</text>

  <!-- 箭头 -->
  <line x1="355" y1="120" x2="405" y2="120" stroke="#722ed1" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- timeout 队列 -->
  <rect x="410" y="90" width="150" height="60" rx="8" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
  <text x="485" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#fa8c16">timeout 队列</text>
  <text x="485" y="128" text-anchor="middle" font-size="10" fill="#888">TTL = 15 分钟</text>
  <text x="485" y="142" text-anchor="middle" font-size="9" fill="#999">x-dead-letter</text>

  <!-- 箭头 - 过期转发 -->
  <line x1="560" y1="120" x2="610" y2="120" stroke="#ff4d4f" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="585" y="108" text-anchor="middle" font-size="9" fill="#ff4d4f">过期</text>

  <!-- dlx 死信队列 -->
  <rect x="615" y="90" width="140" height="60" rx="8" fill="#fff1f0" stroke="#ff4d4f" stroke-width="2"/>
  <text x="685" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#ff4d4f">dlx 死信队列</text>
  <text x="685" y="128" text-anchor="middle" font-size="10" fill="#888">路由键: reserve.dlx</text>

  <!-- 箭头 -->
  <line x1="755" y1="120" x2="805" y2="120" stroke="#ff4d4f" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- 消费者 -->
  <rect x="810" y="80" width="150" height="80" rx="8" fill="#fff1f0" stroke="#ff4d4f" stroke-width="1.5"/>
  <text x="885" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#ff4d4f">TimeoutConsumer</text>
  <text x="885" y="118" text-anchor="middle" font-size="9" fill="#666">1. 状态0→3（爽约）</text>
  <text x="885" y="132" text-anchor="middle" font-size="9" fill="#666">2. 删Redis占座标记</text>
  <text x="885" y="146" text-anchor="middle" font-size="9" fill="#666">3. Feign扣信用分10分</text>


  <!-- ===== 场景2：取消预约 ===== -->
  <rect x="20" y="260" width="960" height="170" rx="12" fill="#f6ffed" stroke="#52c41a" stroke-width="1.5"/>
  <text x="40" y="290" font-size="16" font-weight="700" fill="#52c41a">场景2：取消预约</text>
  <text x="40" y="310" font-size="11" fill="#999">用户主动取消预约，异步释放 Redis 资源</text>

  <!-- 取消预约 -->
  <rect x="50" y="335" width="120" height="50" rx="8" fill="#f0f5ff" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="110" y="358" text-anchor="middle" font-size="12" font-weight="600" fill="#5b6abf">取消预约</text>
  <text x="110" y="374" text-anchor="middle" font-size="10" fill="#888">convertAndSend()</text>

  <line x1="170" y1="360" x2="220" y2="360" stroke="#5b6abf" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 交换机 -->
  <rect x="225" y="335" width="130" height="50" rx="8" fill="#f9f0ff" stroke="#722ed1" stroke-width="1.5"/>
  <text x="290" y="355" text-anchor="middle" font-size="11" font-weight="600" fill="#722ed1">reserve.direct</text>
  <text x="290" y="372" text-anchor="middle" font-size="9" fill="#888">路由键: reserve.cancel</text>

  <line x1="355" y1="360" x2="405" y2="360" stroke="#722ed1" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- cancel 队列 -->
  <rect x="410" y="335" width="140" height="50" rx="8" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
  <text x="480" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#52c41a">cancel 队列</text>
  <text x="480" y="374" text-anchor="middle" font-size="9" fill="#888">reserve.cancel.queue</text>

  <line x1="550" y1="360" x2="600" y2="360" stroke="#52c41a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 消费者 -->
  <rect x="605" y="325" width="170" height="70" rx="8" fill="#f6ffed" stroke="#52c41a" stroke-width="1.5"/>
  <text x="690" y="348" text-anchor="middle" font-size="11" font-weight="600" fill="#52c41a">CancelConsumer</text>
  <text x="690" y="364" text-anchor="middle" font-size="9" fill="#666">1. 删 seat:occupy:...</text>
  <text x="690" y="378" text-anchor="middle" font-size="9" fill="#666">2. 删 user:reserve:...</text>


  <!-- ===== 场景3：签到成功 ===== -->
  <rect x="20" y="450" width="960" height="170" rx="12" fill="#e6f7ff" stroke="#1890ff" stroke-width="1.5"/>
  <text x="40" y="480" font-size="16" font-weight="700" fill="#1890ff">场景3：签到成功</text>
  <text x="40" y="500" font-size="11" fill="#999">用户签到后，异步更新信用分（重置连续爽约记录）</text>

  <!-- 签到成功 -->
  <rect x="50" y="525" width="120" height="50" rx="8" fill="#f0f5ff" stroke="#5b6abf" stroke-width="1.5"/>
  <text x="110" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#5b6abf">签到成功</text>
  <text x="110" y="564" text-anchor="middle" font-size="10" fill="#888">convertAndSend()</text>

  <line x1="170" y1="550" x2="220" y2="550" stroke="#5b6abf" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 交换机 -->
  <rect x="225" y="525" width="130" height="50" rx="8" fill="#f9f0ff" stroke="#722ed1" stroke-width="1.5"/>
  <text x="290" y="545" text-anchor="middle" font-size="11" font-weight="600" fill="#722ed1">checkin.direct</text>
  <text x="290" y="562" text-anchor="middle" font-size="9" fill="#888">路由键: checkin.done</text>

  <line x1="355" y1="550" x2="405" y2="550" stroke="#722ed1" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- checkin 队列 -->
  <rect x="410" y="525" width="140" height="50" rx="8" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
  <text x="480" y="548" text-anchor="middle" font-size="11" font-weight="600" fill="#1890ff">checkin 队列</text>
  <text x="480" y="564" text-anchor="middle" font-size="9" fill="#888">checkin.done.queue</text>

  <line x1="550" y1="550" x2="600" y2="550" stroke="#1890ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 消费者 -->
  <rect x="605" y="515" width="180" height="70" rx="8" fill="#e6f7ff" stroke="#1890ff" stroke-width="1.5"/>
  <text x="695" y="538" text-anchor="middle" font-size="11" font-weight="600" fill="#1890ff">CheckInConsumer</text>
  <text x="695" y="554" text-anchor="middle" font-size="9" fill="#666">Feign 调用 user 服务</text>
  <text x="695" y="568" text-anchor="middle" font-size="9" fill="#666">更新信用分（重置爽约）</text>


  <!-- 图例 -->
  <rect x="20" y="660" width="960" height="45" rx="8" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/>
  <text x="40" y="688" font-size="12" font-weight="600" fill="#333">图例：</text>
  <rect x="110" y="676" width="20" height="14" rx="3" fill="#f0f5ff" stroke="#5b6abf" stroke-width="1"/>
  <text x="138" y="688" font-size="11" fill="#666">发送方</text>
  <rect x="200" y="676" width="20" height="14" rx="3" fill="#f9f0ff" stroke="#722ed1" stroke-width="1"/>
  <text x="228" y="688" font-size="11" fill="#666">交换机</text>
  <rect x="290" y="676" width="20" height="14" rx="3" fill="#fff7e6" stroke="#fa8c16" stroke-width="1"/>
  <text x="318" y="688" font-size="11" fill="#666">队列</text>
  <rect x="370" y="676" width="20" height="14" rx="3" fill="#fff1f0" stroke="#ff4d4f" stroke-width="1"/>
  <text x="398" y="688" font-size="11" fill="#666">消费者</text>
  <line x1="450" y1="683" x2="480" y2="683" stroke="#ff4d4f" stroke-width="2"/>
  <text x="488" y="688" font-size="11" fill="#666">过期转发</text>
  <line x1="570" y1="683" x2="600" y2="683" stroke="#5b6abf" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="608" y="688" font-size="11" fill="#666">Feign 调用</text>
</svg>
</body>
</html>
